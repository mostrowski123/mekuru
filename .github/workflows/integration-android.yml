name: Android Integration Tests

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/integration-android.yml'
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/integration-android.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: gradle-

      - name: Configure Gradle for GitHub runner
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.workers.max=2
          org.gradle.vfs.watch=false
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate environment config
        run: >
          flutter pub run environment_config:generate
          --sentryDsn=
          --sentryEnvironment=ci

      - name: Enable KVM
        run: |
          sudo tee /etc/udev/rules.d/99-kvm4all.rules <<'EOF'
          KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"
          EOF
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD system image
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images/android-34
          key: avd-34-google_atd-x86_64-v1

      - name: Pre-create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          ANDROID_SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT" -type f -path '*/bin/sdkmanager' | head -n 1)"
          AVDMANAGER="$(find "$ANDROID_SDK_ROOT" -type f -path '*/bin/avdmanager' | head -n 1)"

          if [ -z "$SDKMANAGER" ] || [ -z "$AVDMANAGER" ]; then
            echo "Android SDK command-line tools not found under $ANDROID_SDK_ROOT" >&2
            exit 1
          fi

          yes | "$SDKMANAGER" --install "system-images;android-34;google_atd;x86_64" --channel=0
          echo "no" | "$AVDMANAGER" create avd -n test -k "system-images;android-34;google_atd;x86_64" --device "pixel_6" --force

      - name: Run Android integration smoke test
        timeout-minutes: 30
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_atd
          arch: x86_64
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          disk-size: 2048M
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
            -no-metrics
          force-avd-creation: ${{ steps.avd-cache.outputs.cache-hit != 'true' }}
          script: >
            flutter test integration_test/app_smoke_test.dart
            -d emulator-5554
            --dart-define=FORCE_DEBUG_APP_CHECK_PROVIDER=true
            -r expanded
