name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set release tag from timestamp
        id: tag
        run: |
          TAG="v$(date -u +'%Y%m%d.%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Mekuru $TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/release.jks" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release \
            -storepass mekuru-ci -keypass mekuru-ci \
            -dname "CN=Mekuru CI, O=Mekuru, L=Unknown, ST=Unknown, C=US"

      - name: Set signing environment
        run: |
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=mekuru-ci" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=release" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=mekuru-ci" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
