name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate environment config
        run: >
          flutter pub run environment_config:generate
          --sentryDsn=${{ secrets.SENTRY_DSN }}
          --sentryEnvironment=production

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        timeout-minutes: 20
        run: flutter test -r expanded

      - name: Set release tag and version code
        id: tag
        run: |
          TAG="v$(date -u +'%Y%m%d.%H%M%S')"
          VERSION_CODE="$(date -u +'%Y%m%d%H')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Mekuru $TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Set signing environment
        run: |
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release --build-number=${{ steps.tag.outputs.version_code }} --target-platform android-arm,android-arm64,android-x64

      - name: Verify MeCab native libs in release APK
        run: |
          python - <<'PY'
          import sys
          import zipfile

          archive = "build/app/outputs/flutter-apk/app-release.apk"
          abis = ["armeabi-v7a", "arm64-v8a", "x86_64"]
          libs = ["libc++_shared.so", "libmecab_dart.so"]

          with zipfile.ZipFile(archive) as zf:
              names = zf.namelist()

          missing = [
              f"lib/{abi}/{lib}"
              for abi in abis
              for lib in libs
              if not any(entry.endswith(f"lib/{abi}/{lib}") for entry in names)
          ]
          if missing:
              print(f"Missing required native libraries in {archive}:", file=sys.stderr)
              for name in missing:
                  print(f"  - {name}", file=sys.stderr)
              print("Found MeCab-related ABI entries:", file=sys.stderr)
              for entry in sorted(
                  name
                  for name in names
                  if any(f"lib/{abi}/" in name for abi in abis)
                  and ("libmecab_dart.so" in name or "libc++_shared.so" in name)
              ):
                  print(f"  - {entry}", file=sys.stderr)
              sys.exit(1)

          print(f"Verified required MeCab native libraries in {archive}")
          PY

      - name: Build release App Bundle
        run: flutter build appbundle --release --build-number=${{ steps.tag.outputs.version_code }} --target-platform android-arm,android-arm64,android-x64

      - name: Verify MeCab native libs in release App Bundle
        run: |
          python - <<'PY'
          import sys
          import zipfile

          archive = "build/app/outputs/bundle/release/app-release.aab"
          abis = ["armeabi-v7a", "arm64-v8a", "x86_64"]
          libs = ["libc++_shared.so", "libmecab_dart.so"]

          with zipfile.ZipFile(archive) as zf:
              names = zf.namelist()

          missing = [
              f"lib/{abi}/{lib}"
              for abi in abis
              for lib in libs
              if not any(entry.endswith(f"lib/{abi}/{lib}") for entry in names)
          ]
          if missing:
              print(f"Missing required native libraries in {archive}:", file=sys.stderr)
              for name in missing:
                  print(f"  - {name}", file=sys.stderr)
              print("Found MeCab-related ABI entries:", file=sys.stderr)
              for entry in sorted(
                  name
                  for name in names
                  if any(f"lib/{abi}/" in name for abi in abis)
                  and ("libmecab_dart.so" in name or "libc++_shared.so" in name)
              ):
                  print(f"  - {entry}", file=sys.stderr)
              sys.exit(1)

          print(f"Verified required MeCab native libraries in {archive}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Google Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: moe.matthew.mekuru
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          releaseName: ${{ steps.tag.outputs.name }}
