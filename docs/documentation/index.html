<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mekuru Documentation</title>
  <meta name="description" content="Documentation for Mekuru, a Japanese-first EPUB and manga reader.">
  <link rel="icon" href="../icon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #d0bcff;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #d0bcff;
      --sidebar-nav-link-border-color--active: #d0bcff;
      --link-color: #d0bcff;
      --link-color--hover: #e8daff;
    }
    .app-name-link img {
      max-width: 48px;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="../icon.png" alt="icon">Mekuru',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
      auto2top: true,
      homepage: 'home.md',
      notFoundPage: '404.md',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-dart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
