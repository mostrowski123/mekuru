name: mekuru
description: "Japanese EPUB Reader with vertical text and offline Yomitan dictionary."
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (with Riverpod code generation)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Database (Drift — SQLite-backed, type-safe, isolate support)
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41
  drift_flutter: ^0.2.8

  # Reader rendering (custom epub.js bridge via InAppWebView)
  flutter_inappwebview: ^6.1.5

  # File Handling
  archive: ^4.0.7
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  path: ^1.9.1

  # Japanese morphological analysis
  mecab_for_flutter: ^2.0.0

  # Streaming JSON parsing (for large dictionary collection files)
  json_events: ^1.2.2

  # Fuzzy search
  fuzzy_bolt: ^2.0.2

  # Image processing (manga auto-crop)
  image: ^4.0.0

  # Utilities
  convert: ^3.1.2
  csv: ^7.2.0
  crypto: ^3.0.6
  uuid: ^4.5.3
  mime: ^2.0.0
  xml: ^6.5.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0

  # Error tracking and user feedback
  sentry_flutter: ^9.14.0

  # Confetti animation (Pro unlock celebration)
  confetti: ^0.8.0

  # Reader display
  screen_brightness: ^2.1.7
  wakelock_plus: ^1.4.0
  flutter_tilt: ^3.3.2

  # Kanji stroke order
  flutter_svg: ^2.0.17

  # AnkiDroid integration (Android only)
  ankidroid_for_flutter: ^1.0.3

  # Firebase (OCR server authentication)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_app_check: ^0.4.1+4
  google_sign_in: ^7.2.0

  # In-app purchases (OCR monetization)
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+8

  # Background task scheduling (OCR processing)
  workmanager: ^0.9.0

  # HTTP client for OCR server
  http: ^1.3.0
  http_parser: ^4.1.2

dev_dependencies:
  sentry_dart_plugin: ^3.2.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.0
  build_runner: ^2.4.0
  environment_config: ^4.0.0+1

dependency_overrides:
  mecab_for_dart:
    git:
      url: https://github.com/mostrowski123/mecab_for_dart.git
      ref: d1df9a339831a2691a446f58983fd1d36b74293a

flutter:
  uses-material-design: true

  assets:
    - assets/epub_viewer/
    - assets/ipadic/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: mekuru
  org: matt-dl

